name: Syntax check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile Python sources
        run: python -m compileall -q rap_transclip scripts tests
      - name: Check shell scripts
        run: bash -n scripts/run_paper_full.sh
