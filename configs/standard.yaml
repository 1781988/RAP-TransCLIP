project:
  name: TextGraph-TransCLIP
  seed: 1
  device: cuda

paths:
  datasets: datasets
  indexes: outputs/indexes
  features: outputs/features
  results: outputs/results/textgraph
  checkpoints: checkpoints

datasets:
  - AID
  - EuroSAT
  - MLRSNet
  - OPTIMAL31
  - PatternNet
  - RESISC45
  - RSC11
  - RSICB128
  - RSICB256
  - WHURS19

models:
  CLIP:
    enabled: false
    backend: open_clip
    architectures:
      ViT-L-14:
        pretrained: openai
        checkpoint: null
  RemoteCLIP:
    enabled: false
    backend: open_clip_checkpoint
    architectures:
      ViT-L-14:
        pretrained: null
        checkpoint: checkpoints/RemoteCLIP/RemoteCLIP-ViT-L-14.pt
  GeoRSCLIP:
    enabled: true
    backend: open_clip_checkpoint
    architectures:
      ViT-L-14:
        pretrained: null
        checkpoint: checkpoints/GeoRSCLIP/RS5M_ViT-L-14.pt
  SkyCLIP50:
    enabled: false
    backend: open_clip_checkpoint
    architectures:
      ViT-L-14:
        pretrained: null
        checkpoint: checkpoints/SkyCLIP50/SkyCLIP_ViT_L14_top50pct_epoch_20.pt

feature_extraction:
  batch_size: 64
  num_workers: 8
  amp: true
  prompt_file: configs/prompts/rs106.txt
  image_extensions: [.jpg, .jpeg, .png, .tif, .tiff, .bmp, .webp]

zero_shot:
  logit_scale: 100.0

graph:
  backend: auto
  k: 3
  mutual: false
  kernel: cosine
  local_scale_rank: 3
  chunk_size: 2048
  minimum_similarity: 0.0

text_graph:
  semantic_strength: 1.0
  semantic_power: 1.0
  confidence_power: 1.0

solver:
  outer_iterations: 10
  assignment_iterations: 5
  graph_strength: 1.0
  text_anchor_strength: 1.0
  likelihood_temperature: 50.0
  covariance_floor: 1.0e-4
  prototype_topk: 8
  convergence_tolerance: 1.0e-5

protocol:
  name: full
  seed: 1

runtime:
  deterministic: true
  save_diagnostics: true
  overwrite: false
  experiment_tag: textgraph_main
