project:
  name: ObjectContext-CLIP
  seed: 1
  device: cuda

paths:
  datasets: datasets
  indexes: outputs/indexes
  features: outputs/features_object_context
  results: outputs/results/object_context_core_standard
  checkpoints: checkpoints

datasets:
  - AID
  - EuroSAT
  - MLRSNet
  - OPTIMAL31
  - PatternNet
  - RESISC45
  - RSC11
  - RSICB128
  - RSICB256
  - WHURS19

models:
  CLIP:
    enabled: false
    backend: open_clip
    architectures:
      ViT-L-14:
        pretrained: openai
        checkpoint: null
  RemoteCLIP:
    enabled: false
    backend: open_clip_checkpoint
    architectures:
      ViT-L-14:
        pretrained: null
        checkpoint: checkpoints/RemoteCLIP/RemoteCLIP-ViT-L-14.pt
  GeoRSCLIP:
    enabled: true
    backend: open_clip_checkpoint
    architectures:
      ViT-L-14:
        pretrained: null
        checkpoint: checkpoints/GeoRSCLIP/RS5M_ViT-L-14.pt
  SkyCLIP50:
    enabled: false
    backend: open_clip_checkpoint
    architectures:
      ViT-L-14:
        pretrained: null
        checkpoint: checkpoints/SkyCLIP50/SkyCLIP_ViT_L14_top50pct_epoch_20.pt

feature_extraction:
  batch_size: 8
  num_workers: 8
  amp: true
  storage_dtype: float16
  variant: clean
  downsample_factor: 1
  image_extensions: [.jpg, .jpeg, .png, .tif, .tiff, .bmp, .webp]

local_views:
  scales: [0.50, 0.75]
  positions: [center, top_left, top_right, bottom_left, bottom_right]

concept_bank:
  common_knowledge: configs/concepts/common_remote_sensing.yaml
  dataset_override_pattern: configs/concepts/{dataset}.yaml

semantic_prompts:
  batch_size: 256
  class_templates:
    - "a satellite image of {text}"
    - "an aerial image of {text}"
    - "a remote sensing scene of {text}"
  context_templates:
    - "{text}"
    - "a satellite image showing {text}"
    - "an aerial view characterized by {text}"
  object_templates:
    - "a close-up aerial view of {text}"
    - "a remote sensing crop containing {text}"
    - "a local image patch showing {text}"

inference:
  class_name_weight: 0.50
  local_topk: 2
  multicrop_local_weight: 0.50

  object_topk: 2
  object_view_topk: 2
  object_concept_mode: correct
  concept_shuffle_seed: 17

  positive_residual_only: true
  residual_weight: 0.50
  use_object_gate: true
  object_gate_center: 0.0
  object_gate_temperature: 0.50
  max_residual_boost: 1.0

  fixed_object_weight: 0.50
  score_chunk_size: 128
  global_temperature: 0.01
  fusion_temperature: 1.0

runtime:
  save_predictions: true
  overwrite: false
  experiment_tag: core_standard
